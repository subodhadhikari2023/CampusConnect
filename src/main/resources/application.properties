spring.application.name=CampusConnect

spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:campusConnect}?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:${MYSQL_USER:campusConnect}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:password}}


spring.main.banner-mode=off
logging.level.root=info
server.error.whitelabel.enabled=false

file.upload-dir=${UPLOAD_DIR:uploads/}

#spring.jpa.hibernate.ddl-auto=update


# Actuator — expose only the health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Max file size limit
spring.servlet.multipart.max-file-size=1000000MB
spring.servlet.multipart.max-request-size=1000000MB


server.compression.enabled=true
server.compression.mime-types=application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.ms-powerpoint,text/plain,text/csv,text/markdown,application/json,text/html,text/xml,text/css,text/javascript,application/javascript,application/octet-stream,image/png,image/jpeg,audio/mpeg,audio/wav,audio/ogg,video/mp4,video/x-msvideo
