<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Sign In &mdash; CampusConnect</title>
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/loginResources/CSS/main.css}">
</head>
<body>

<div class="login-bg">
    <div class="login-card">

        <div class="login-card__header">
            <img th:src="@{/loginResources/images/main-logo-black-transparent.png}"
                 alt="CampusConnect" class="login-card__logo">
            <p class="login-card__tagline">A Collaborative Learning Platform</p>
        </div>

        <h2 class="login-card__title">Sign In</h2>

        <div th:if="${param.logout}" class="alert alert-info alert-sm mb-3" role="alert">
            You have been logged out.
        </div>
        <div th:if="${param.error}" class="alert alert-danger alert-sm mb-3" role="alert">
            Incorrect username or password. Please try again.
        </div>

        <form th:action="@{/authenticateTheUser}" method="POST">

            <div class="login-field">
                <label class="login-field__label" for="username">Username</label>
                <input id="username" type="text" name="username"
                       class="form-control login-field__input"
                       placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="login-field">
                <label class="login-field__label" for="password">Password</label>
                <div class="login-field__password-wrap">
                    <input id="password" type="password" name="password"
                           class="form-control login-field__input"
                           placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="login-field__eye" onclick="togglePassword()"
                            aria-label="Toggle password visibility">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn login-btn-submit">Sign In</button>

        </form>

        <div class="login-card__footer">
            <a th:href="@{/}" class="login-card__home-link">&larr; Back to Home</a>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    }
</script>
</body>
</html>
