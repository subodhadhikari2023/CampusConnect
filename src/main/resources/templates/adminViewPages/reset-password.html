<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title>Reset Password &mdash; CampusConnect</title>
    <link rel="stylesheet" th:href="@{/CSS/admin/main.css}">
    <link rel="stylesheet" th:href="@{/CSS/admin/userAddForm.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{adminViewPages/sidebar :: sidebar}"></div>

<div class="admin-page-content">
<main class="admin-main">
<div class="admin-container">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="form-card">
                <div class="form-card-title">
                    Reset Password: <span th:text="${targetUser.userId}"></span>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger mb-3" th:text="${errorMessage}"></div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input class="form-control" type="text" th:value="${targetUser.userId}" readonly>
                    <div class="form-text text-muted">The existing password for this user will be replaced.</div>
                </div>

                <form th:action="@{/admin/reset-password}" method="POST" id="resetForm">
                    <input type="hidden" name="userId" th:value="${targetUser.userId}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="newPassword">New Password</label>
                        <div class="password-wrapper">
                            <input class="form-control" id="newPassword" name="newPassword"
                                   type="password" placeholder="Enter new password"
                                   required autocomplete="new-password">
                            <button type="button" class="password-toggle"
                                    onclick="toggleField('newPassword','iconNew')"
                                    aria-label="Toggle password visibility">
                                <i class="fas fa-eye" id="iconNew"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input class="form-control" id="confirmPassword" name="confirmPassword"
                                   type="password" placeholder="Re-enter new password"
                                   required autocomplete="new-password">
                            <button type="button" class="password-toggle"
                                    onclick="toggleField('confirmPassword','iconConfirm')"
                                    aria-label="Toggle password visibility">
                                <i class="fas fa-eye" id="iconConfirm"></i>
                            </button>
                        </div>
                        <div id="matchError" class="text-danger small mt-1" style="display:none;">
                            Passwords do not match.
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-primary" type="submit">Reset Password</button>
                        <a th:href="@{/admin}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</main>
<div th:replace="~{adminViewPages/footer :: footer}"></div>
</div>

<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
<script>
    function toggleField(fieldId, iconId) {
        const field = document.getElementById(fieldId);
        const icon  = document.getElementById(iconId);
        const show  = field.type === 'password';
        field.type  = show ? 'text' : 'password';
        icon.classList.toggle('fa-eye',       !show);
        icon.classList.toggle('fa-eye-slash',  show);
    }

    document.getElementById('resetForm').addEventListener('submit', function (e) {
        const match = document.getElementById('newPassword').value ===
                      document.getElementById('confirmPassword').value;
        if (!match) {
            e.preventDefault();
            document.getElementById('matchError').style.display = 'block';
        }
    });
</script>
</body>
</html>
