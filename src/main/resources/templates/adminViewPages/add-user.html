<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title th:text="${user.userId != null and !#strings.isEmpty(user.userId)} ? 'Edit User' : 'Add User'">Add User</title>
    <link rel="stylesheet" th:href="@{/CSS/theme.css}">
    <link rel="stylesheet" th:href="@{/CSS/admin/main.css}">
    <link rel="stylesheet" th:href="@{/CSS/admin/userAddForm.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{adminViewPages/sidebar :: sidebar}"></div>

<div class="admin-page-content">
<main class="admin-main">
<div class="admin-container">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="form-card">
                <div class="form-card-title"
                     th:text="${user.userId != null and !#strings.isEmpty(user.userId)} ? 'Edit User: ' + ${user.userId} : 'Add New User'">
                    Add New User
                </div>

                <form th:action="@{/admin/save}" method="POST" th:object="${user}">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="username">Username</label>
                        <input class="form-control" id="username" type="text" required
                               th:field="*{userId}"
                               th:readonly="${user.userId != null and !#strings.isEmpty(user.userId)}">
                        <div th:if="${user.userId != null and !#strings.isEmpty(user.userId)}"
                             class="form-text text-muted">Username cannot be changed after creation.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="email">Email</label>
                        <input class="form-control" id="email" type="email" required th:field="*{email}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="password">Password</label>
                        <div class="password-wrapper">
                            <input class="form-control" id="password" type="password"
                                   th:field="*{password}"
                                   th:required="${user.userId == null or #strings.isEmpty(user.userId)}"
                                   th:placeholder="${user.userId != null and !#strings.isEmpty(user.userId)} ? 'Leave blank to keep current password' : 'Enter password'">
                            <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
                                <i class="fas fa-eye" id="passwordToggle"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="role">Role</label>
                        <select class="form-select" id="role" required th:field="${roles.role}">
                            <option th:value="ROLE_STUDENT">Student</option>
                            <option th:value="ROLE_TEACHER">Teacher</option>
                            <option th:value="ROLE_HOD">HOD</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="department">Department</label>
                        <select class="form-select" id="department" required th:field="*{deptID}">
                            <option disabled selected value="">Select a department</option>
                            <option th:each="d : ${departments}" th:text="${d.name}" th:value="${d.id}"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="active"
                                   th:field="*{active}" role="switch">
                            <label class="form-check-label fw-semibold" for="active">Active</label>
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-primary" type="submit"
                                th:text="${user.userId != null and !#strings.isEmpty(user.userId)} ? 'Update User' : 'Add User'">
                            Add User
                        </button>
                        <a th:href="@{/admin}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</main>
<div th:replace="~{adminViewPages/footer :: footer}"></div>
</div>

<script th:src="@{/javascript/Admin/togglepassword.js}"></script>
<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
