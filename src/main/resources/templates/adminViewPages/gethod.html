<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title>HODs</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{adminViewPages/navbar :: navbar}"></div>
<div class="container my-5">
    <h2 class="mb-4">Heads of Department</h2>
    <div th:if="${userHODs.empty}" class="alert alert-info">No HODs registered yet.</div>
    <table th:unless="${userHODs.empty}" class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Department</th>
            <th>Active</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="hod : ${userHODs}">
            <td th:text="${hod.userId}"></td>
            <td th:text="${hod.email}"></td>
            <td th:text="${hod.department}"></td>
            <td>
                <span th:if="${hod.active}" class="badge bg-success">Active</span>
                <span th:unless="${hod.active}" class="badge bg-secondary">Inactive</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+VumWk0I1pHQG6EzfuZ8DEy5/VeKJ"
        crossorigin="anonymous"></script>
</body>
</html>
