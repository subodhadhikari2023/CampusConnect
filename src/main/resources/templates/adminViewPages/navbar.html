<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous"/>
</head>
<body>
<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" th:href="@{/admin}">
                <img th:src="@{/loginResources/images/main-logo-black-transparent.png}" height="40" alt="CampusConnect">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar"
                    aria-controls="adminNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- Users dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="usersDropdown" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false">
                            Users
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="usersDropdown">
                            <li><a class="dropdown-item" th:href="@{/admin/students}">Students</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/teachers}">Teachers</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/hods}">HODs</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/admin/inactive-users}">Inactive Users</a></li>
                        </ul>
                    </li>
                    <!-- Academic dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="academicDropdown" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false">
                            Academic
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="academicDropdown">
                            <li><a class="dropdown-item" th:href="@{/admin/departments}">Departments</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/semesters}">Semesters</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/courses}">Courses</a></li>
                        </ul>
                    </li>
                    <!-- Files standalone link -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/files}">Files</a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="POST" class="d-flex">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+VumWk0I1pHQG6EzfuZ8DEy5/VeKJ"
        crossorigin="anonymous"></script>
</body>
</html>
