<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <title th:text="${semester.semesterId != null} ? 'Edit Semester' : 'Add Semester'">Add Semester</title>
    <link rel="stylesheet" th:href="@{/CSS/theme.css}">
    <link rel="stylesheet" th:href="@{/CSS/admin/main.css}">
    <link rel="stylesheet" th:href="@{/CSS/admin/userAddForm.css}">
</head>
<body>
<div th:replace="~{adminViewPages/sidebar :: sidebar}"></div>

<div class="admin-page-content">
<main class="admin-main">
<div class="admin-container">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="form-card">
                <div class="form-card-title"
                     th:text="${semester.semesterId != null} ? 'Edit Semester' : 'Add Semester'">
                    Add Semester
                </div>

                <form th:action="@{/admin/save-semester}" method="POST" th:object="${semester}">
                    <input type="hidden" th:field="*{semesterId}"/>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="semesterName">Semester Name</label>
                        <input class="form-control" id="semesterName" type="text" required
                               th:field="*{semesterName}" placeholder="e.g. Semester I">
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-primary" type="submit"
                                th:text="${semester.semesterId != null} ? 'Update Semester' : 'Add Semester'">
                            Add Semester
                        </button>
                        <a th:href="@{/admin/semesters}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</main>
<div th:replace="~{adminViewPages/footer :: footer}"></div>
</div>

<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
