<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title th:text="${semester.semesterId != null} ? 'Edit Semester' : 'Add Semester'">Add Semester</title>
    <link rel="stylesheet" th:href="@{/CSS/admin/main.css}">
    <link rel="stylesheet" th:href="@{/CSS/admin/userAddForm.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
          crossorigin="anonymous" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{adminViewPages/navbar :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="form-card">
                <div class="form-card-title"
                     th:text="${semester.semesterId != null} ? 'Edit Semester' : 'Add Semester'">
                    Add Semester
                </div>

                <form th:action="@{/admin/save-semester}" method="POST" th:object="${semester}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" th:field="*{semesterId}"/>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="semesterName">Semester Name</label>
                        <input class="form-control" id="semesterName" type="text" required
                               th:field="*{semesterName}" placeholder="e.g. Semester I">
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit"
                                th:text="${semester.semesterId != null} ? 'Update Semester' : 'Add Semester'">
                            Add Semester
                        </button>
                        <a th:href="@{/admin/semesters}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+VumWk0I1pHQG6EzfuZ8DEy5/VeKJ"
        crossorigin="anonymous"></script>
</body>
</html>
