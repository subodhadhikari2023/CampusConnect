<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/CSS/admin/main.css}">
</head>
<body>
<div th:replace="~{adminViewPages/navbar :: navbar}"></div>
<div class="container mt-4">
    <h5 class="mb-4 text-muted">Welcome, <span sec:authentication="principal.username"></span></h5>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="stats-container">
        <table class="stats-box">
            <thead><tr><td><h4>Total Users</h4></td></tr></thead>
            <tbody><tr><td th:text="${totalUsers}"></td></tr></tbody>
        </table>
        <table class="stats-box">
            <thead><tr><td><h4>Total Students</h4></td></tr></thead>
            <tbody><tr><td th:text="${totalStudents}"></td></tr></tbody>
        </table>
        <table class="stats-box">
            <thead><tr><td><h4>Total Teachers</h4></td></tr></thead>
            <tbody><tr><td th:text="${totalTeachers}"></td></tr></tbody>
        </table>
        <table class="stats-box">
            <thead><tr><td><h4>Total HODs</h4></td></tr></thead>
            <tbody><tr><td th:text="${totalHods}"></td></tr></tbody>
        </table>
    </div>

    <div class="action-buttons mt-4">
        <a class="text-white" th:href="@{/admin/add-user}">
            <button class="action-button">Add User</button>
        </a>
    </div>
</div>
<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
