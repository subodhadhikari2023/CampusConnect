<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title>Profile &mdash; CampusConnect</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/CSS/theme.css}">
    <link rel="stylesheet" th:href="@{/CSS/teacher/portal.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{teacherViewPages/teachersidebar :: teachersidebar}"></div>

<div class="teacher-page-content">
<main>
<div class="teacher-container">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="teacher-upload-card">
                <div class="teacher-upload-card__title">My Profile</div>

                <div th:if="${successMessage}" class="alert alert-success mb-3" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}"   class="alert alert-danger  mb-3" th:text="${errorMessage}"></div>

                <form th:action="@{/teacher/save-profile}" method="POST" id="profileForm">
                    <input type="hidden" name="userId" th:value="${teacher.userId}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input class="form-control" type="text" th:value="${teacher.userId}" readonly>
                        <div class="form-text text-muted">Username cannot be changed.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Department</label>
                        <input class="form-control" type="text" th:value="${teacher.department}" readonly>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="email">Email</label>
                        <input class="form-control" id="email" name="email" type="email"
                               required th:value="${teacher.email}">
                    </div>

                    <hr class="my-4">
                    <p class="fw-semibold mb-3" style="color: var(--clr-text);">
                        Change Password
                        <small class="fw-normal text-muted">(leave blank to keep current)</small>
                    </p>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="newPassword">New Password</label>
                        <div class="password-wrapper">
                            <input class="form-control" id="newPassword" name="newPassword"
                                   type="password" placeholder="Enter new password"
                                   autocomplete="new-password" value="">
                            <button type="button" class="password-toggle"
                                    onclick="toggleField('newPassword','iconNew')"
                                    aria-label="Toggle password visibility">
                                <i class="fas fa-eye" id="iconNew"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input class="form-control" id="confirmPassword" name="confirmPassword"
                                   type="password" placeholder="Re-enter new password"
                                   autocomplete="new-password" value="">
                            <button type="button" class="password-toggle"
                                    onclick="toggleField('confirmPassword','iconConfirm')"
                                    aria-label="Toggle password visibility">
                                <i class="fas fa-eye" id="iconConfirm"></i>
                            </button>
                        </div>
                        <div id="matchError" class="text-danger small mt-1" style="display:none;">
                            Passwords do not match.
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-primary" type="submit">Save Changes</button>
                        <a th:href="@{/teacher}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</main>
<footer class="teacher-footer" th:text="'&copy; ' + ${currentYear} + ' CampusConnect'"></footer>
</div>

<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
<script>
    function toggleField(fieldId, iconId) {
        const field = document.getElementById(fieldId);
        const icon  = document.getElementById(iconId);
        const show  = field.type === 'password';
        field.type  = show ? 'text' : 'password';
        icon.classList.toggle('fa-eye',      !show);
        icon.classList.toggle('fa-eye-slash', show);
    }

    document.getElementById('profileForm').addEventListener('submit', function (e) {
        const pw      = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (pw && pw !== confirm) {
            e.preventDefault();
            document.getElementById('matchError').style.display = 'block';
        }
    });
</script>
</body>
</html>
