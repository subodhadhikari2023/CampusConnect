<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title>Uploaded Resources &mdash; CampusConnect</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/CSS/theme.css}">
    <link rel="stylesheet" th:href="@{/CSS/teacher/portal.css}">
</head>
<body>
<div th:replace="~{teacherViewPages/teachersidebar :: teachersidebar}"></div>

<div class="teacher-page-content">
<main>
<div class="teacher-container">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h2 class="fw-semibold mb-0" style="color:var(--clr-text);">Uploaded Resources</h2>
        <a th:href="@{/teacher}" class="btn btn-outline-secondary btn-sm">Dashboard</a>
    </div>

    <div th:if="${resources.size() == 0}" class="alert alert-info">
        No files uploaded yet. Use the sidebar links to upload resources.
    </div>

    <div th:unless="${resources.size() == 0}" class="teacher-table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle" style="font-size:0.875rem;">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Category</th>
                    <th>Department</th>
                    <th>Course</th>
                    <th>Semester</th>
                    <th>Subject</th>
                    <th>File Name</th>
                    <th>Upload Date</th>
                    <th style="width:80px;"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="resource, stat : ${resources}">
                    <td th:text="${stat.count}" class="text-muted"></td>
                    <td th:text="${resource.fileRole}"></td>
                    <td>
                        <span th:each="dept : ${departmentList}"
                              th:if="${dept.id == resource.fileDepartmentId}"
                              th:text="${dept.name}"></span>
                    </td>
                    <td>
                        <span th:each="course : ${courseDetails}"
                              th:if="${course.courseId == resource.courseId}"
                              th:text="${course.courseName}"></span>
                    </td>
                    <td>
                        <span th:each="sem : ${semesterList}"
                              th:if="${sem.semesterId == resource.semesterId}"
                              th:text="${sem.semesterName}"></span>
                    </td>
                    <td>
                        <span th:each="subject : ${subjectList}"
                              th:if="${subject.subjectId == resource.subjectId}"
                              th:text="${subject.subjectName}"></span>
                    </td>
                    <td th:text="${resource.fileName}"></td>
                    <td th:text="${resource.uploadDate}"></td>
                    <td>
                        <form th:action="@{/teacher/deleteResource(id=${resource.id})}" method="POST"
                              th:data-name="${resource.fileName}"
                              onsubmit="return confirm('Delete ' + this.dataset.name + '? This cannot be undone.')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</main>
<footer class="teacher-footer" th:text="'&copy; ' + ${currentYear} + ' CampusConnect'"></footer>
</div>

<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
