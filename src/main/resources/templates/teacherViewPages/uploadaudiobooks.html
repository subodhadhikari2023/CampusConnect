<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Audio Books</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/CSS/theme.css}">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--clr-bg);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background-color: var(--clr-surface);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }

        .header {
            text-align: center;
            font-size: 24px;
        }

        .highlight {
            color: orange;
            font-weight: bold;
        }

        .divider {
            margin: 10px 0;
            border: 0;
            border-top: 2px solid orange;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            color: var(--clr-text);
        }

        select, input[type="file"] {
            height: 35px;
            padding: 5px 10px;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            width: 100%;
        }

        .btn {
            margin-top: 20px;
            text-decoration: none;
            padding: 10px 20px;
            color: var(--clr-text-white);
            background-color: var(--clr-primary);
            border: none;
            border-radius: var(--radius-sm);
        }

        .btn:hover {
            background-color: var(--clr-primary-dark);
        }
    </style>
</head>
<body>
<h1 class="header">Campus<span class="highlight">Connect</span></h1>
<hr class="divider">

<div class="container">
    <form action="#" th:action="@{/teacher/upload}" th:method="POST" enctype="multipart/form-data"
          th:object="${fileUploadDTO}">
        <input type="hidden" th:field="*{fileRole}" />
        <div class="form-group">
            <label for="department">Department</label>
            <select id="department" class="form-control" th:field="*{departmentId}" required>
                <option value="" selected>Select</option>
                <option th:each="dep: ${departments}" th:text="${dep.name}" th:value="${dep.id}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="course">Courses</label>
            <select id="course" class="form-control" th:field="*{courseId}" required>
                <option value="" selected>Select</option>
                <option th:each="course : ${courses}" th:text="${course.courseName}" th:value="${course.courseId}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="semester">Semester</label>
            <select id="semester" class="form-control" th:field="*{semesterId}" required>
                <option value="" selected>Select</option>
                <option th:each="semester : ${semesterList}" th:text="${semester.semesterName}"
                        th:value="${semester.semesterId}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" class="form-control" th:field="*{subjectId}" required>
                <option value="" selected>Select</option>
                <option th:each="subject : ${subjectList}" th:text="${subject.subjectName}"
                        th:value="${subject.subjectId}"></option>
            </select>
        </div>


        <div class="form-group">
            <h2>Select AudioBooks</h2>
            <label for="file">Files accepted (.mp3)</label>
            <input type="file" id="file" class="form-control" required th:accept="'.mp3'" th:field="*{file}">
        </div>

        <button type="submit" class="btn">Upload</button>
    </form>
</div>

<!-- Bootstrap JS -->
<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
