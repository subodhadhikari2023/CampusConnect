<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title>Upload Presentations &mdash; CampusConnect</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/CSS/theme.css}">
    <link rel="stylesheet" th:href="@{/CSS/teacher/portal.css}">
</head>
<body>
<div th:replace="~{teacherViewPages/teachersidebar :: teachersidebar}"></div>

<div class="teacher-page-content">
<main>
<div class="teacher-container">

    <div class="teacher-upload-card">
        <div class="teacher-upload-card__title">&#128196; Upload Presentations</div>

        <form th:action="@{/teacher/upload}" method="POST" enctype="multipart/form-data"
              th:object="${fileUploadDTO}">
            <input type="hidden" th:field="*{fileRole}"/>

            <div class="mb-3">
                <label class="form-label fw-semibold">Department</label>
                <input class="form-control" type="text" th:value="${departmentName}" readonly>
                <input type="hidden" th:field="*{departmentId}">
            </div>

            <div class="mb-3">
                <label for="courseId" class="form-label fw-semibold">Course</label>
                <select id="courseId" class="form-select" th:field="*{courseId}" required>
                    <option value="" disabled selected>Select course</option>
                    <option th:each="course : ${courses}" th:value="${course.courseId}" th:text="${course.courseName}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="semesterId" class="form-label fw-semibold">Semester</label>
                <select id="semesterId" class="form-select" th:field="*{semesterId}" required>
                    <option value="" disabled selected>Select semester</option>
                    <option th:each="sem : ${semesterList}" th:value="${sem.semesterId}" th:text="${sem.semesterName}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="subjectId" class="form-label fw-semibold">Subject</label>
                <select id="subjectId" class="form-select" th:field="*{subjectId}" required>
                    <option value="" disabled selected>Select subject</option>
                    <option th:each="sub : ${subjectList}" th:value="${sub.subjectId}" th:text="${sub.subjectName}"></option>
                </select>
            </div>

            <div class="mb-4">
                <label for="file" class="form-label fw-semibold">File</label>
                <small class="text-muted d-block mb-1">Accepted: .pptx, .ppt</small>
                <input type="file" id="file" name="file" class="form-control"
                       accept=".pptx,.ppt" required>
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <button type="submit" class="btn btn-primary">Upload</button>
                <a th:href="@{/teacher}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>

</div>
</main>
<footer class="teacher-footer" th:text="'&copy; ' + ${currentYear} + ' CampusConnect'"></footer>
</div>

<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
