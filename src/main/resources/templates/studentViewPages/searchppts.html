<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title>Search Resources &mdash; CampusConnect</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/CSS/theme.css}">
    <link rel="stylesheet" th:href="@{/CSS/student/portal.css}">
</head>
<body>
<div th:replace="~{studentViewPages/studentheader :: studentheader}"></div>

<div class="student-page-content">
<div class="student-container student-container--narrow">

    <div class="student-search-card">
        <div class="student-search-card__title">Find Resources</div>

        <form th:action="@{/student/PPTs/fetchData}" method="POST" enctype="multipart/form-data"
              th:object="${fileUploadDTO}">
            <input type="hidden" th:field="*{fileRole}" th:value="*{fileRole}">

            <div class="mb-3">
                <label for="departmentId" class="form-label fw-semibold">Department</label>
                <select id="departmentId" class="form-select" th:field="*{departmentId}" required>
                    <option value="" disabled selected>Select department</option>
                    <option th:each="dep : ${departments}" th:value="${dep.id}" th:text="${dep.name}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="courseId" class="form-label fw-semibold">Course</label>
                <select id="courseId" class="form-select" th:field="*{courseId}" required>
                    <option value="" disabled selected>Select course</option>
                    <option th:each="course : ${courses}" th:value="${course.courseId}" th:text="${course.courseName}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="semesterId" class="form-label fw-semibold">Semester</label>
                <select id="semesterId" class="form-select" th:field="*{semesterId}" required>
                    <option value="" disabled selected>Select semester</option>
                    <option th:each="sem : ${semesterList}" th:value="${sem.semesterId}" th:text="${sem.semesterName}"></option>
                </select>
            </div>

            <div class="mb-4">
                <label for="subjectId" class="form-label fw-semibold">Subject</label>
                <select id="subjectId" class="form-select" th:field="*{subjectId}" required>
                    <option value="" disabled selected>Select subject</option>
                    <option th:each="sub : ${subjectList}" th:value="${sub.subjectId}" th:text="${sub.subjectName}"></option>
                </select>
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <button type="submit" class="btn btn-primary">Search</button>
                <a th:href="@{/student}" class="btn btn-outline-secondary">Back</a>
            </div>
        </form>
    </div>

</div>
</div>
<footer class="student-footer" th:text="'&copy; ' + ${currentYear} + ' CampusConnect'"></footer>

<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
