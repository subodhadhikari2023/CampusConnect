<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/images/main-logo-black.jpeg}" type="image/png">
    <title>Resources &mdash; CampusConnect</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/CSS/theme.css}">
    <link rel="stylesheet" th:href="@{/CSS/student/portal.css}">
</head>
<body>
<div th:replace="~{studentViewPages/studentheader :: studentheader}"></div>

<div class="student-page-content">
<div class="student-container">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h2 class="fw-semibold mb-0" style="color:var(--clr-text);">Available Resources</h2>
        <a th:href="@{/student}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
    </div>

    <div th:if="${fileDataList == null or fileDataList.isEmpty()}" class="alert alert-info">
        No resources found for the selected filters.
        <a th:href="@{/student}" class="ms-1">Try a different search.</a>
    </div>

    <div th:unless="${fileDataList == null or fileDataList.isEmpty()}" class="student-results-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Category</th>
                    <th>Department</th>
                    <th>Course</th>
                    <th>Semester</th>
                    <th>Subject</th>
                    <th>Uploaded By</th>
                    <th>File Name</th>
                    <th>Date</th>
                    <th>Download</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="resource, stat : ${fileDataList}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${resource.fileRole}"></td>
                    <td>
                        <span th:each="dept : ${departments}"
                              th:if="${dept.id == resource.fileDepartmentId}"
                              th:text="${dept.name}"></span>
                    </td>
                    <td>
                        <span th:each="course : ${courses}"
                              th:if="${course.courseId == resource.courseId}"
                              th:text="${course.courseName}"></span>
                    </td>
                    <td>
                        <span th:each="sem : ${semesterList}"
                              th:if="${sem.semesterId == resource.semesterId}"
                              th:text="${sem.semesterName}"></span>
                    </td>
                    <td>
                        <span th:each="sub : ${subjectList}"
                              th:if="${sub.subjectId == resource.subjectId}"
                              th:text="${sub.subjectName}"></span>
                    </td>
                    <td>
                        <span th:each="user : ${userList}"
                              th:if="${user.userId == resource.ownersName}"
                              th:text="${user.userId}"></span>
                    </td>
                    <td th:text="${resource.fileName}"></td>
                    <td th:text="${resource.uploadDate}"></td>
                    <td>
                        <div class="d-flex flex-wrap justify-content-center gap-1">
                            <a class="btn btn-primary btn-sm"
                               th:href="@{/view/{f}(f=${resource.fileName})}" target="_blank">View</a>
                            <a class="btn btn-success btn-sm"
                               th:href="@{/student/download/original/{id}(id=${resource.id})}" download>Original</a>
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/student/download/gzip/{id}(id=${resource.id})}" download>GZIP</a>
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/student/download/zip/{id}(id=${resource.id})}" download>ZIP</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</div>
<footer class="student-footer" th:text="'&copy; ' + ${currentYear} + ' CampusConnect'"></footer>

<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
