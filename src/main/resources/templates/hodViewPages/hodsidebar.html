<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="hodsidebar">

    <nav class="navbar navbar-expand-lg hod-navbar fixed-top">
        <div class="container-fluid">

            <!-- Brand -->
            <a class="navbar-brand" th:href="@{/hod}">
                <img th:src="@{/loginResources/images/main-logo-white-transparent.png}" alt="CampusConnect">
                HOD Portal
                <span class="hod-role-badge">HOD</span>
            </a>

            <!-- Mobile toggle -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#hodNavCollapse"
                    aria-controls="hodNavCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="hodNavCollapse">

                <!-- Primary nav links -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link"
                           th:classappend="${currentUri == '/hod'} ? ' is-active'"
                           th:href="@{/hod}">Dashboard</a>
                    </li>

                    <!-- Courses dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle"
                           th:classappend="${currentUri.startsWith('/hod/add-course') or
                                            currentUri.startsWith('/hod/manage-course') or
                                            currentUri.startsWith('/hod/semesters') or
                                            currentUri.startsWith('/hod/curriculum')} ? ' is-active'"
                           href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Courses
                        </a>
                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item"
                                   th:classappend="${currentUri.startsWith('/hod/add-course')} ? ' is-active'"
                                   th:href="@{/hod/add-course}">Add Course</a>
                            </li>
                            <li>
                                <a class="dropdown-item"
                                   th:classappend="${currentUri.startsWith('/hod/manage-course')} ? ' is-active'"
                                   th:href="@{/hod/manage-course}">Manage Courses</a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item"
                                   th:classappend="${currentUri.startsWith('/hod/semesters')} ? ' is-active'"
                                   th:href="@{/hod/semesters}">Semesters</a>
                            </li>
                            <li>
                                <a class="dropdown-item"
                                   th:classappend="${currentUri.startsWith('/hod/curriculum')} ? ' is-active'"
                                   th:href="@{/hod/curriculum}">Curriculum</a>
                            </li>
                        </ul>
                    </li>

                    <!-- Subjects dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle"
                           th:classappend="${currentUri.startsWith('/hod/add-subject') or
                                            currentUri.startsWith('/hod/manage-subject')} ? ' is-active'"
                           href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Subjects
                        </a>
                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item"
                                   th:classappend="${currentUri.startsWith('/hod/add-subject')} ? ' is-active'"
                                   th:href="@{/hod/add-subject}">Add Subject</a>
                            </li>
                            <li>
                                <a class="dropdown-item"
                                   th:classappend="${currentUri.startsWith('/hod/manage-subject')} ? ' is-active'"
                                   th:href="@{/hod/manage-subject}">Manage Subjects</a>
                            </li>
                        </ul>
                    </li>

                    <!-- Members link -->
                    <li class="nav-item">
                        <a class="nav-link"
                           th:classappend="${currentUri.startsWith('/hod/members')} ? ' is-active'"
                           th:href="@{/hod/members}">Members</a>
                    </li>

                </ul>

                <!-- Right: username · profile · logout -->
                <ul class="navbar-nav ms-auto align-items-center gap-1">
                    <li class="nav-item d-none d-lg-block">
                        <span class="nav-link pe-1" style="color:rgba(255,255,255,0.45); font-size:0.78rem; cursor:default;">
                            <sec:authentication property="principal.username"/>
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link"
                           th:classappend="${currentUri.startsWith('/hod/profile')} ? ' is-active'"
                           th:href="@{/hod/profile}">Profile</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="POST">
                            <button type="submit" class="hod-logout-btn">Logout</button>
                        </form>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

</div>
</body>
</html>
