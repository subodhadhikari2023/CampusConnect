services:
  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: campusConnect
      MYSQL_USER: campusConnect
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "campusConnect", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    image: ghcr.io/subodhadhikari2023/campusconnect:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/campusConnect
      DB_USERNAME: campusConnect
      DB_PASSWORD: ${DB_PASSWORD}
      UPLOAD_DIR: /uploads/
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  uploads:
